name: Daily Stock News

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

jobs:
  run-stock-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests twilio

      - name: Run stock news script
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          STOCK_PRICE_API: ${{ secrets.STOCK_PRICE_API }}
          NEWS_API: ${{ secrets.NEWS_API }}
        run: python main.py
